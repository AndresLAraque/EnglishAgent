version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: english-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  bot:
    build: .
    container_name: english-bot
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    ports:
      - "80:80"

volumes:
  ollama_data:
